<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Verknüpfung -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- TradingView Lightweight Charts CDN -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Header Bereich -->
    <header id="main-header">
        <div class="logo">StockMaster</div>
        <div class="settings-icon">
            <ion-icon name="settings-sharp"></ion-icon>
        </div>
    </header>

    <!-- Hauptbereich -->
    <main id="app-container">
        <section class="content-column">
            <div id="chart-container" class="card" style="min-height: 500px;">
                <!-- Hier malt das Modul gleich automatisch rein -->
            </div>            
            
            <div id="details-container">
                <h2>Details zum Ticker</h2>
            </div>
        </section>

        <aside class="watchlist-column">
            <div id="watchlist-container" class="card"></div>
        </aside>
    </main>

    <!-- Ionicons Scripts -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- JS Module: Strikte Ladereihenfolge! -->
    
    <!-- 0. Konfiguration & Konstanten -->
    <script src="js/events.js"></script>

    <!-- 1. Utilities (Werkzeuge) -->
    <script src="js/utils/httpClient.js"></script>

    <!-- 2. Services -->
    <script src="js/services/notificationService.js"></script>
    <script src="js/services/finnhubService.js"></script>
    <script src="js/services/fmpService.js"></script>

    <!-- 3. Repositories (Datenbank-Schicht) -->
    <script src="js/repositories/tickerRepository.js"></script>
    <script src="js/repositories/intelligenceRepository.js"></script>
    
    <!-- 4. UI Module -->
    <script src="js/modules/watchlist.js"></script>
    <script src="js/modules/intelligence.js"></script>
    
    <!-- 5. Orchestrierung -->
    <script src="js/app.js"></script>

    <!-- 6. Charting (TradingView Lightweight Charts) -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="js/modules/chart.js"></script>
</body>
</html>
