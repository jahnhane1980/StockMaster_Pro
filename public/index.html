<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Verknüpfung (Modulare Kaskade gemäß Regel 3 & 7) -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- TradingView Lightweight Charts CDN -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Header Bereich -->
    <header id="main-header" class="header">
        <div class="header__logo">
            <img src="img/logo.png" alt="StockMaster Logo" class="logo-img">
            StockMaster
        </div>

        <div class="header__settings-icon" aria-label="Menü öffnen" role="button" tabindex="0">
            <ion-icon name="menu"></ion-icon>
        </div>

        <div id="top-loader" class="top-loader-bar"></div>
    </header>

    <!-- Hauptbereich -->
    <main id="app-container" class="l-main-layout">
        <section class="content-column">
            <div id="chart-container" class="l-chart card">
                <!-- Hier zeichnet das ChartModule automatisch rein -->
            </div>            
            
            <div id="details-container" class="card">
                <h2 id="board-ticker-name">Details zum Ticker</h2>
                
                <!-- Empty State & Intelligence Board teilen sich min-height via layout.css (Regel 7) -->
                <div id="empty-state" class="u-flex-center l-details-placeholder">
                    <p>Bitte wähle eine Aktie aus der Watchlist aus.</p>
                </div>
                
                <div id="intelligence-board" class="u-hidden c-intelligence-board">
                    <div>
                        <span id="board-price">--</span>
                        <span id="board-change">--</span>
                    </div>
                    
                    <div class="sentiment">
                        <h3>Fundamentals</h3>
                        <p>Market Cap: <span id="val-mcap">--</span></p>
                        <p>Debt/Equity: <span id="val-debt">--</span></p>
                        <p>Rev. Growth: <span id="val-rev">--</span></p>
                    </div>

                    <div class="sentiment">
                        <h3>Sentiment (News)</h3>
                        <p id="sentiment-text">Lädt...</p>
                        <div class="sentiment__bar">
                            <div id="sentiment-indicator" class="sentiment__indicator"></div>
                        </div>
                    </div>

                    <div id="correlations-container" class="sentiment">
                        <h3>Correlations</h3>
                        <div id="correlations-list">--</div>
                    </div>

                    <div class="sentiment">
                        <h3>Technical Indicators</h3>
                        <p>OBV: <span id="val-obv">--</span></p>
                    </div>
                </div>
            </div>
        </section>

        <aside class="watchlist-column">
            <div id="watchlist-container" class="l-watchlist card">
                <div class="search-container">
                    <input type="text" id="ticker-search" placeholder="Ticker (z.B. MARA)..." aria-label="Ticker Symbol suchen">
                    <button id="add-ticker-btn" class="btn btn-icon" aria-label="Ticker hinzufügen">
                        <ion-icon name="add"></ion-icon>
                    </button>
                    <span id="status-message" class="watchlist__status"></span>
                </div>
                <div id="watchlist-items" class="watchlist__items"></div>
            </div>
        </aside>
    </main>

    <!-- Ionicons Scripts -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- JS Module -->
    <script src="js/Events.js"></script>
    <script src="js/utils/HttpStatus.js"></script>
    <script src="js/utils/AppConstants.js"></script>
    <script src="js/utils/Messages.js"></script>
    <script src="js/utils/HttpClient.js"></script>
    <script src="js/services/NotificationService.js"></script>
    <script src="js/services/BackendService.js"></script>
    <script src="js/repositories/TickerRepository.js"></script>
    <script src="js/repositories/IntelligenceRepository.js"></script>
    <script src="js/modules/Header.js"></script>
    <script src="js/modules/Watchlist.js"></script>
    <script src="js/modules/Intelligence.js"></script>
    <script src="js/App.js"></script>
    <script src="js/modules/Chart.js"></script>
</body>
</html>
