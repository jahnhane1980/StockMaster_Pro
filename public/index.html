<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Verknüpfung -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- TradingView Lightweight Charts CDN -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Header Bereich -->
    <header id="main-header">
        <div class="logo">StockMaster</div>
        
        <div class="search-container">
            <input type="text" id="ticker-search" placeholder="Ticker (z.B. MARA)...">
            <button id="add-ticker-btn">Hinzufügen</button>
            <span id="status-message"></span>
        </div>

        <div class="settings-icon">
            <ion-icon name="settings-sharp"></ion-icon>
        </div>
    </header>

    <!-- Hauptbereich -->
    <main id="app-container">
        <section class="content-column">
            <div id="chart-container" class="card">
                <!-- Hier zeichnet das ChartModule automatisch rein -->
            </div>            
            
            <div id="details-container" class="card">
                <h2 id="board-ticker-name">Details zum Ticker</h2>
                
                <div id="empty-state">Bitte wähle eine Aktie aus der Watchlist.</div>
                
                <div id="intelligence-board" class="hidden">
                    <div>
                        <span id="board-price">--</span>
                        <span id="board-change">--</span>
                    </div>
                    
                    <div class="sentiment-container">
                        <h3>Fundamentals</h3>
                        <p>Market Cap: <span id="val-mcap">--</span></p>
                        <p>Debt/Equity: <span id="val-debt">--</span></p>
                        <p>Rev. Growth: <span id="val-rev">--</span></p>
                    </div>

                    <div class="sentiment-container">
                        <h3>Sentiment (News)</h3>
                        <p id="sentiment-text">Lädt...</p>
                        <div class="sentiment-bar">
                            <div id="sentiment-indicator" class="sentiment-dot"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="watchlist-column">
            <div id="watchlist-container" class="card"></div>
        </aside>
    </main>

    <!-- Ionicons Scripts -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- JS Module -->
    <script src="js/events.js"></script>
    <script src="js/utils/httpClient.js"></script>
    <script src="js/services/notificationService.js"></script>
    <script src="js/services/backendService.js"></script>
    <script src="js/repositories/tickerRepository.js"></script>
    <script src="js/repositories/intelligenceRepository.js"></script>
    <script src="js/modules/watchlist.js"></script>
    <script src="js/modules/intelligence.js"></script>
    <script src="js/app.js"></script>
    <script src="js/modules/chart.js"></script>
</body>
</html>
